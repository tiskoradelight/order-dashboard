<!DOCTYPE html>
<html>
<head>
    <title>Order Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Daily Order Dashboard</h1>

<h2>Order Entry Form</h2>

<label>Date</label><br>
<input type="date" id="date"><br><br>

<label>Amazon Orders</label><br>
<input type="number" id="amazon"><br><br>

<label>Meesho TD Orders</label><br>
<input type="number" id="meeshoTD"><br><br>

<label>Meesho MM Orders</label><br>
<input type="number" id="meeshoMM"><br><br>

<label>Flipkart Orders</label><br>
<input type="number" id="flipkart"><br><br>

<button onclick="saveData()">Save</button>

<hr>
<h2>Today's Summary</h2>

<p>Date : <span id="showDate">-</span></p>

<p>Amazon Orders : <span id="showAmazon">0</span></p>

<p>Meesho TD Orders : <span id="showMeeshoTD">0</span></p>

<p>Meesho MM Orders : <span id="showMeeshoMM">0</span></p>

<p>Flipkart Orders : <span id="showFlipkart">0</span></p>

<p><b>Total Orders : <span id="showTotal">0</span></b></p>
<hr>

<h2>Order History</h2>

<table border="1" cellpadding="10">
    <thead>
        <tr>
            <th>Date</th>
            <th>Amazon</th>
            <th>Meesho TD</th>
            <th>Meesho MM</th>
            <th>Flipkart</th>
            <th>Total</th>
        </tr>
    </thead>

    <tbody id="historyTable">

    </tbody>

</table>

<script src="script.js"></script>

</body>
</html>
